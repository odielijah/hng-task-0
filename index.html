<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HNG Stage 0 Todo</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <!-- Root Card Container -->
    <article data-testid="test-todo-card" class="todo-card">
      <div class="card-content">
        <header class="card-header">
          <div class="header-top">
            <!-- Task Title -->
            <h2 id="todo-title" data-testid="test-todo-title">
              Finish HNG Task 0
            </h2>
            <!-- Status Badge -->
            <span
              id="status-badge"
              data-testid="test-todo-status"
              class="badge-pending"
              >Pending</span
            >
          </div>

          <div class="header-meta">
            <!-- Priority Badge -->
            <span data-testid="test-todo-priority" class="priority-badge"
              >High</span
            >

            <!-- Time Remaining Hint -->
            <div class="time-hint">
              <span class="icon">🕒</span>
              <time id="time-remaining" data-testid="test-todo-time-remaining" aria-live="polite"
                >Due in 3 days</time
              >
            </div>
          </div>
        </header>
        <!-- Task Description -->
        <p data-testid="test-todo-description" class="description">
          Complete the frontend task for stage 0 of the HNG internship.
        </p>

        <hr class="divider" />

        <div class="middle-row">
          <!-- Due Date / Deadline -->
          <div class="date-box">
            <span class="icon">📅</span>
            <time data-testid="test-todo-due-date" datetime="2026-04-16"
              >Due Apr 16, 2026</time
            >
          </div>
          <ul data-testid="test-todo-tags" class="tag-list" role="list">
            <li data-testid="test-todo-tag-work" class="tag work">Work</li>
            <li data-testid="test-todo-tag-urgent" class="tag urgent">
              Urgent
            </li>
          </ul>
        </div>

        <!-- Checkbox -->
        <div class="complete-area">
          <input
            type="checkbox"
            id="complete-toggle"
            data-testid="test-todo-complete-toggle"
          />
          <label for="complete-toggle">Mark as Complete</label>
        </div>

        <footer class="card-footer">
          <button
            data-testid="test-todo-edit-button"
            class="btn-edit"
            aria-label="Edit Task"
            onclick="console.log('edit clicked')"
          >
            <span>✏️</span> Edit
          </button>
          <button
            data-testid="test-todo-delete-button"
            class="btn-delete"
            aria-label="Delete Task"
            onclick="alert('delete clicked')"
          >
            <span>🗑️</span> Delete
          </button>
        </footer>
      </div>
    </article>

    <script src="script.js"></script>
  </body>
</html>
